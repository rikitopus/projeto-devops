name: Continuous Integration
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Install Dependencies
        run: composer install

      - name: PHP Lint
        run: vendor/bin/phpcs src/

      - name: Security Audit
        run: composer audit

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build and start Docker containers
        run: docker compose up -d

      - name: Wait for MySQL
        run: docker compose exec -T mysql mysqladmin ping -h localhost --silent --wait=10

      - name: Verify PHP is running
        run: docker compose exec -T php php -v

      - name: Stop Docker containers
        if: always()
        run: docker compose down

  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Notify on any push
        if: github.event_name == 'push'
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#f4e842"
          username: "GitHub Bot"
          message: |
            🔔 Push realizado!

            **${{ github.event.head_commit.message }}**

            🌿 Branch: `${{ github.ref_name }}`

            [Repositório](${{ github.event.repository.html_url }})
